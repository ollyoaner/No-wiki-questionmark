- type: entity
  id: ZombieOutbreak
  parent: BaseGameRule
  components:
  - type: StationEvent
    earliestStart: 90
    minimumPlayers: 20
    weight: 1 # Zombies was happening basically every single survival round, so now it's super rare
    duration: 1
    maxOccurrences: 1
    requiredJobs:
      HeadOfSecurity: 1
      SecurityOfficer: 1
      Warden: 1
  - type: EventHeat # HardLight: quick rule but a lasting outbreak; injected as a large decaying impulse
    cost: 160
  - type: ZombieRule
  - type: AntagSelection
    definitions:
    - prefRoles: [ InitialInfected ]
      max: 3
      playerRatio: 10
      blacklist:
        components:
        - ZombieImmune
        - AntagImmune
      briefing:
        text: zombie-patientzero-role-greeting
        color: Plum
        sound: "/Audio/Ambience/Antag/zombie_start.ogg"
      components:
      - type: PendingZombie #less time to prepare than normal
        minInitialInfectedGrace: 300
        maxInitialInfectedGrace: 450
      - type: ZombifyOnDeath
      - type: IncurableZombie
      - type: InitialInfected
      mindRoles:
      - MindRoleInitialInfected

- type: entity
  parent: BaseNukeopsRule
  id: LoneOpsSpawn
  components:
  - type: StationEvent
    earliestStart: 35
    weight: 5.5
    minimumPlayers: 15
    duration: 1
    reoccurrenceDelay: 200
    requiredJobs:
      HeadOfSecurity: 1
      SecurityOfficer: 1
      Warden: 1
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/Shuttles/ShuttleEvent/striker.yml
  - type: EventHeat # HardLight: lone ops; large decaying impulse keeps new threats off for a while
    cost: 170
