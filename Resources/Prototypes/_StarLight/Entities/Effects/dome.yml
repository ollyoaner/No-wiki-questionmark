- type: entity
  id: EnergyDomeNullspace
  categories: [ HideSpawnMenu ]
  parent: EnergyDomeBase
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 12
        density: 0
        hard: false
        mask:
        - None
        layer:
        - MidImpassable
  - type: Sprite
    drawdepth: WallTops
    sprite: Effects/EnergyDome/energydome_big.rsi
    scale: 4.8, 4.8
    layers:
    - state: big
      color: "#6c15ae"
      shader: unshaded
  - type: NullSpaceBlocker
    bypassPVS: true
    unphaseOnCollide: false
  - type: Visibility
    layer: 32
  - type: AmbientSound
    enabled: false
