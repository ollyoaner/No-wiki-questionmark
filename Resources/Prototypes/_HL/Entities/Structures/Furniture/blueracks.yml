# Suit storage
- type: entity
  id: StructureStorageUnitBluespace
  name: bluespace suit storage unit
  parent: StructureWeaponRackSlots
  description: A storage unit for storing up to four hardsuits. Also power of bluespace crystals protects your items from dockyard workers!
  suffix: Empty
  components:
  - type: StaticPrice
    price: 150000
  - type: CargoSellBlacklist
  - type: HLPersistOnShipSave
  - type: ShipyardSellCondition # Frontier: Teleport to shipyard console on sale
    preserveOnSale: true
  - type: Sprite
    noRot: true
    sprite: _HL/Structures/Storage/bluespacesuit_storage.rsi
    layers:
    - state: base
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
  - type: AccessReader
  - type: Lock
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        density: 350
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: EntityStorageVisuals
    stateBase: base
    stateDoorOpen: base
    stateDoorClosed: door
  - type: LockVisuals
  - type: EntityStorage
    capacity: 1
  - type: Construction
    graph: SuitLockerBluespace
    node: SuitStorageBluespace
  - type: ItemSlots
    slots:
      weapon1:
        insertVerbText: suit-storage-verb-insert-suit-01
        ejectVerbText: suit-storage-verb-eject-suit-01
        name: suit-storage-name-stored-suit-slot
        whitelist:
          components:
          - PressureProtection
      weapon2:
        insertVerbText: suit-storage-verb-insert-suit-02
        ejectVerbText: suit-storage-verb-eject-suit-02
        name: suit-storage-name-stored-suit-slot
        whitelist:
          components:
          - PressureProtection
      weapon3:
        insertVerbText: suit-storage-verb-insert-suit-03
        ejectVerbText: suit-storage-verb-eject-suit-03
        name: suit-storage-name-stored-suit-slot
        whitelist:
          components:
          - PressureProtection
      weapon4:
        insertVerbText: suit-storage-verb-insert-suit-04
        ejectVerbText: suit-storage-verb-eject-suit-04
        name: suit-storage-name-stored-suit-slot
        whitelist:
          components:
          - PressureProtection
      weapon5:
        insertVerbText: suit-storage-verb-insert-suit-05
        ejectVerbText: suit-storage-verb-eject-suit-05
        name: suit-storage-name-stored-suit-slot
        whitelist:
          components:
          - PressureProtection