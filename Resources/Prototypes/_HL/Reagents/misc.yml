- type: reagent
  id: Ink
  name: reagent-name-ink
  group: Medicine
  desc: reagent-desc-ink
  physicalDesc: reagent-physical-desc-inky-black
  flavor: sweet
  color: "#ae0072"
  metabolisms:
    Medicine:
      metabolismRate : 0.02
      effects:
      - !type:Aphrodisiac
        aphrodisiacPower: 6
        conditions:
        - !type:ConsentCondition
          consent: Aphrodisiacs
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages:
          - "reagent-effect-aphrodisiac-normal1"
          - "reagent-effect-aphrodisiac-normal2"
          - "reagent-effect-aphrodisiac-normal3"
          - "reagent-effect-aphrodisiac-normal4"
          - "reagent-effect-aphrodisiac-normal5"
          - "reagent-effect-aphrodisiac-normal6"
          - "reagent-effect-aphrodisiac-normal7"
          - "reagent-effect-aphrodisiac-normal8"
          - "reagent-effect-aphrodisiac-normal9"
          - "reagent-effect-aphrodisiac-normal10"
          - "reagent-effect-aphrodisiac-normal11"
          - "reagent-effect-aphrodisiac-normal12"
          - "reagent-effect-aphrodisiac-normal13"
          - "reagent-effect-aphrodisiac-normal14"
          - "reagent-effect-aphrodisiac-normal15"
        probability: 0.04
        conditions:
        - !type:ReagentThreshold
          max: 16.5
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        messages:
          - "reagent-effect-aphrodisiac-normaloverdose1" # overdose makes you tired and forgetful
          - "reagent-effect-aphrodisiac-normaloverdose2"
          - "reagent-effect-aphrodisiac-normaloverdose3"
          - "reagent-effect-aphrodisiac-normaloverdose4"
          - "reagent-effect-aphrodisiac-normaloverdose5"
          - "reagent-effect-aphrodisiac-normaloverdose6"
          - "reagent-effect-aphrodisiac-normaloverdose7"
          - "reagent-effect-aphrodisiac-normaloverdose8"
          - "reagent-effect-aphrodisiac-normaloverdose9"
          - "reagent-effect-aphrodisiac-normaloverdose10"
        probability: 0.06
        conditions:
        - !type:ReagentThreshold
          min: 16.5
      - !type:Emote
        conditions:
        - !type:ReagentThreshold
          min: 16.5
        emote: Yawn
        showInChat: true
        probability: 0.02
      - !type:MovespeedModifier
        walkSpeedModifier: 0.8
        sprintSpeedModifier: 0.8
        conditions:
        - !type:ReagentThreshold
          min: 16.5
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 30.0
        key: ForcedSleep
        component: ForcedSleeping
        refresh: false
        type: Add
        probability: 0.1
      - !type:HealthChange # poisons you if you take way too much
        conditions:
        - !type:ReagentThreshold
          min: 30
        damage:
          types:
            Poison: 1
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages:
          - "reagent-effect-aphrodisiac-fade" # A decent chance to notify the player when their meds run out, but could happen silently.
        probability: 0.32
        conditions:
          - !type:ReagentThreshold
            max: 0.1
