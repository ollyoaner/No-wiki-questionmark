- author: NotLivyathan
  changes:
    - type: Add
      message: Medical Quadborgs are now able to dispense candies for patients.
    - type: Add
      message: >-
        Encryption keys are now able to be used on Quadborgs to give them new
        radio channels.
    - type: Add
      message: Quadborgs are finally allowed to cum.
    - type: Add
      message: >-
        New Cyborg Storage Modules are now able to be made at a Protolathe once
        Bluespace Storage has been researched, allowing Cyborgs to carry bags
        courtesy of Nookie.
    - type: Add
      message: >-
        Security Quadborgs are now able to be printed at SEC techfabs, albeit
        without custom sprites or names, so they will appear as normal Cyborg
        parts.
