- type: entity
  id: StructureGunRackBluespace
  name: bluespace gun rack
  parent: StructureWeaponRackSlots
  description: A storage unit for expedited pacification measures. Power of bluespace crystals protects your items from dockyard workers!
  suffix: Empty
  components:
  - type: StaticPrice
    price: 100000
  - type: Sprite
    sprite: _HL/Structures/Storage/bluespaceweapon_rack.rsi
    layers:
    - state: base-gun
      color: "#515e5e"
  - type: CargoSellBlacklist
  - type: HLPersistOnShipSave
  - type: ShipyardSellCondition # Frontier: Teleport to shipyard console on sale
    preserveOnSale: true
  - type: ItemSlots
    slots:
      weapon1:
        insertVerbText: weapon-rack-verb-insert-weapon-01
        ejectVerbText: weapon-rack-verb-eject-weapon-01
        name: weapon-rack-name-stored-weapon-slot
        whitelist:
          components:
          - Gun
      weapon2:
        insertVerbText: weapon-rack-verb-insert-weapon-02
        ejectVerbText: weapon-rack-verb-eject-weapon-02
        name: weapon-rack-name-stored-weapon-slot
        whitelist:
          components:
          - Gun
      weapon3:
        insertVerbText: weapon-rack-verb-insert-weapon-03
        ejectVerbText: weapon-rack-verb-eject-weapon-03
        name: weapon-rack-name-stored-weapon-slot
        whitelist:
          components:
          - Gun
      weapon4:
        insertVerbText: weapon-rack-verb-insert-weapon-04
        ejectVerbText: weapon-rack-verb-eject-weapon-04
        name: weapon-rack-name-stored-weapon-slot
        whitelist:
          components:
          - Gun
      weapon5:
        insertVerbText: weapon-rack-verb-insert-weapon-05
        ejectVerbText: weapon-rack-verb-eject-weapon-05
        name: weapon-rack-name-stored-weapon-slot
        whitelist:
          components:
          - Gun
  - type: ItemMapper
    sprite: _NF/Structures/Furniture/Armory/weapon_rack.rsi
