        - type: WorldLoader
          radius: 10
        # FIXME: the dungeon dosen't pass FTL events even though it should FTL in
        #        and we don't get a MapInitEvent, so this just forces static physics
        - type: Physics
          bodyType: Static
          bodyStatus: OnGround
        protos:
        - NFVGRoidBasalt

