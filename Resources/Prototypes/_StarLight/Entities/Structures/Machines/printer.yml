- type: entity
  parent: BaseLathe
  id: PrinterDoc
  name: document printer
  description: Bureaucratic perfection. Stores a database of all ColComm documents, and lets you print them as long as you have paper.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Machines/printer.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: idle
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Transform
    noRot: false
  - type: Machine
    board: PrinterDocMachineCircuitboard
  - type: Lathe
    producingSound: /Audio/Machines/scanning.ogg
    idleState: icon
    runningState: building
    staticPacks:
    - HardLightDocsSecurity
    - HardLightDocsMedical
    - HardLightDocsHM
    - HardLightDocsOther
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 25
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: OreSiloClient
  - type: MaterialStorage
    canEjectStoredMaterials: true
    whitelist:
      tags:
      - Paper
    storage:
      Paper: 0

- type: entity
  parent: BaseFlatpack
  id: PrinterDocFlatpack
  name: document printer flatpack
  description: A flatpack used for constructing a document printer.
  components:
  - type: Flatpack
    entity: PrinterDoc
  - type: Sprite
    layers:
    - state: base
  - type: StaticPrice
    price: 25 # Frontier: 75<25
