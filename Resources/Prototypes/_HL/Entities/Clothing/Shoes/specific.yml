- type: entity
  parent: ClothingShoesBase
  id: HLClothingShoesClockwork
  name: clockwork treads
  description: Industrial boots made of brass. They're very heavy.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Shoes/clockwork_treads.rsi
  - type: Clothing
    sprite: _HL/Clothing/Shoes/clockwork_treads.rsi
 
- type: entity
  parent: [ClothingShoesBase, PowerCellSlotSmallItem, BaseToggleClothing] # BaseSecurityEngineeringContraband<BaseC1Contraband
  id: ClothingShoesBootsChameleonZoom
  name: emperor's new enchanted shoes
  suffix: Chameleon
  components:
    - type: Tag
      tags: [] # ignore "WhitelistChameleon" tag
    - type: Sprite
      sprite: _HL/Clothing/Shoes/zoomshoes.rsi
    - type: Clothing
      sprite: _HL/Clothing/Shoes/zoomshoes.rsi
    - type: ChameleonClothing
      slot: [FEET]
      default: DummyZoomShoesInvisible
    - type: ToggleClothing
      action: ActionToggleSpeedBoots
    - type: ClothingSpeedModifier
      walkModifier: 1.5  # fast, but slower than speed boots. It is exchanged for having ability to DRIP
      sprintModifier: 1.5
    - type: PowerCellDraw
      drawRate: 90      # Hardlight 30>40, you have to turn off micro reactor and antique cell at somepoint
    - type: ToggleCellDraw
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
    - type: UserInterface
      interfaces:
        enum.ChameleonUiKey.Key:
          type: ChameleonBoundUserInterface
          
- type: entity
  parent: ClothingShoesBase
  id: DummyZoomShoesInvisible
  name: emperor's new enchanted shoes
  description: The finest shoes you'll never see. Speed you up quite a bit.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Shoes/zoomshoes.rsi
  - type: Clothing
    sprite: _HL/Clothing/Shoes/zoomshoes.rsi
    
- type: entity
  parent: [ClothingShoesBaseButcherable, BaseC3ExpeditionContraband, ContrabandClothing ] # Frontier: BaseMajorContraband<BaseC3Contraband, added ContrabandClothing
  id: ClothingShoesAberrant #Heavily inspired by Look Outside, i will be honest with you all
  name: aberrant boots
  description: A pair of surprisingly comfortable shoes with teeth at the bottom that grip onto any surface.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Shoes/aberrantboots.rsi
  - type: Clothing
    sprite: _HL/Clothing/Shoes/aberrantboots.rsi
  - type: NoSlip
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialSheetMeat1
      amount: 1
  - type: Magboots # always have gravity because le teeth
  - type: ClothingSpeedModifier
    walkModifier: 1.2 #Just a little treat, makes them better than CE magboots but still a c3 contraband item. Offset by heat weakness too.
    sprintModifier: 1.2
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Effects/Fluids/blood1.ogg
  - type: Armor
    modifiers:
      coefficients:
        Heat: 1.2
