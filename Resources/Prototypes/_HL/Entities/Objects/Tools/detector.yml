- type: entity
  id: NullspaceLocator
  parent: [BaseItem, PowerCellSlotSmallItem]
  name: nullspace locator
  description: A device designed to aid in the locating of nullspace anomalies.
  components:
    - type: Sprite
      sprite: Objects/Specific/Research/anomalylocator.rsi
      layers:
        - state: icon
          color: "#793a80"
        - state: screen
          shader: unshaded
          visible: false
          map: ["enum.ToggleVisuals.Layer"]
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ToggleVisuals.Toggled:
          enum.ToggleVisuals.Layer:
            True: { visible: true }
            False: { visible: false }
    - type: ItemToggle
    - type: ProximityBeeper
    - type: ProximityDetector
      range: 20
      criteria:
        components:
          - NullSpace
          - DarkPortal
          - DarkHub
          - Brighteye
    - type: PowerCellDraw
      drawRate: 1
      useRate: 0
    - type: ToggleCellDraw
    - type: Beeper
      isMuted: true
      minBeepInterval: 0.15
      maxBeepInterval: 1.00
      beepSound:
        path: "/Audio/Items/locator_beep.ogg"
        params:
          maxDistance: 1
          volume: -8
