- type: entity
  parent: BaseGameRule
  id: DragonSpawn
  components:
  - type: StationEvent
    weight: 6
    earliestStart: 40
    reoccurrenceDelay: 400
    minimumPlayers: 15
    duration: null
    requiredJobs:
      HeadOfSecurity: 1
      SecurityOfficer: 1
      Warden: 1
  - type: SpaceSpawnRule
    spawnDistance: 0
  - type: AntagSpawner # Frontier
    prototype: MobDragon # Frontier
  - type: EventHeat # HardLight: ongoing overt threat, keeps the station "hot" while alive
    cost: 130
    sustained: true
  - type: DragonRule
  - type: AntagObjectives
    objectives:
    - CarpRiftsObjective
    - DragonSurviveObjective
  - type: AntagSelection
    agentName: dragon-round-end-agent-name
    definitions:
    - spawnerPrototype: SpawnPointGhostDragon
      min: 1
      max: 1
      pickPlayer: false
      mindRoles:
      - MindRoleDragon

