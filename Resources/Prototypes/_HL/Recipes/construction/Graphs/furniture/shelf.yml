- type: constructionGraph
  id: LockerWallBluespace
  start: start
  graph:
  - node: start
    edges:
    - to: done
      steps:
      - material: Plasteel
        amount: 30
        doAfter: 5
      - material: Bluespace
        amount: 15
        doAfter: 1
  - node: done
    entity: LockerWallBluespace
    edges:
    - to: start
      steps:
      - tool: Screwing
        doAfter: 5
      conditions:
      - !type:StorageWelded
        welded: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetPlasteel
        amount: 30
      - !type:SpawnPrototype
        prototype: MaterialBluespace
        amount: 15
      - !type:EmptyAllContainers
      - !type:DeleteEntity
      
