## Behavior bases
- type: injectorMode
  id: BaseInjectorMode
  abstract: true
  mobTime: 5
  delayPerVolume: 0.1
  transferAmounts: [1, 5, 10, 15]

- type: injectorMode
  id: BaseInjectorInjectMode
  parent: BaseInjectorMode
  abstract: true
  name: injector-mode-inject-name
  behavior: Inject
  popupUserAttempt: injector-component-injecting-user
  popupTargetAttempt: injector-component-injecting-target

- type: injectorMode
  id: BaseInjectorDrawMode
  parent: BaseInjectorMode
  abstract: true
  name: injector-mode-draw-name
  behavior: Draw
  popupUserAttempt: injector-component-drawing-user
  popupTargetAttempt: injector-component-drawing-target

- type: injectorMode
  id: BaseInjectorDynamicMode
  parent: BaseInjectorMode
  abstract: true
  name: injector-mode-dynamic-name
  behavior: Dynamic
  popupUserAttempt: injector-component-injecting-user
  popupTargetAttempt: injector-component-injecting-target

## Syringes
- type: injectorMode
  id: InjectorModeInject
  parent: BaseInjectorInjectMode

- type: injectorMode
  id: InjectorModeDraw
  parent: BaseInjectorDrawMode

- type: injectorMode
  id: BaseBluespaceSyringeMode
  abstract: true
  mobTime: 2.5
  delayPerVolume: 0.03
  transferAmounts: [5, 10, 15, 75, 150]

- type: injectorMode
  id: BluespaceSyringeInjectMode
  parent: [BaseBluespaceSyringeMode, BaseInjectorInjectMode]

- type: injectorMode
  id: BluespaceSyringeDrawMode
  parent: [BaseBluespaceSyringeMode, BaseInjectorDrawMode]

## Jet injectors
- type: injectorMode
  id: BaseJetInjectorMode
  parent: BaseInjectorDynamicMode
  abstract: true
  transferAmounts: [] # No selectable amounts; always injects full reservoir. Draws use the runtime 5u fallback.
  injectSound:
    path: /Audio/Items/Medical/jet_injector.ogg

- type: injectorMode
  id: InjectorModeDynamicInject
  parent: BaseJetInjectorMode

- type: injectorMode
  id: InjectorModeDynamicInjectAdvanced
  parent: BaseJetInjectorMode

- type: injectorMode
  id: InjectorModeDynamicInjectInterdyne
  parent: BaseJetInjectorMode
