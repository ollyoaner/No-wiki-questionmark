      message: Removed several starting comms channels from quadborgs.
    - type: Remove
      message: The Cyborg Detective Module no longer comes with a free Detective PDA.
    - type: Tweak
      message: >-
        Changed IPC welding healing to be faster but heal slightly less, made
        LV, MV, and HV heal incrementally more burn at the cost of slightly
        longer doafters, and gave Cyborgs the same healing system as IPC.
    - type: Tweak
      message: Quadborg job roles now spawn with PDAs.
    - type: Tweak
      message: Quadborgs are now able to unlock themselves.
    - type: Tweak
      message: All Quadborgs now have an additional module slot.
    - type: Tweak
      message: >-
        IPC no longer spawn with an encryption key, but are now able to spawn
        with and wear headsets.
    - type: Fix
      message: >-
        Fixed Scientists, Security Officers, and Station Engineers spawning with
        two PDAs.
