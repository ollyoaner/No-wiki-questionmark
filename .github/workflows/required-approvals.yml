name: Required approvals

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - master
      - prod
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
    - name: Check required approvals
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        case "$BASE_REF" in
          master)
            required=1
            ;;
          prod)
            required=2
            ;;
          *)
            echo "No approval requirement configured for $BASE_REF."
            exit 0
            ;;
        esac

        approvals=$(
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            | jq -s '[.[][]]
              | group_by(.user.login)
              | map(sort_by(.submitted_at) | last)
              | map(select(
                  .state == "APPROVED"
                  and (.author_association == "OWNER"
                    or .author_association == "MEMBER"
                    or .author_association == "COLLABORATOR")
                ))
              | length'
        )

        echo "$BASE_REF requires $required approval(s). Found $approvals trusted approval(s)."

        if [ "$approvals" -lt "$required" ]; then
          echo "::error::$BASE_REF requires $required trusted approval(s), but this PR currently has $approvals."
          exit 1
        fi
