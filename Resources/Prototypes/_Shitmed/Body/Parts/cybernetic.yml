- type: entity
  parent: LeftLegCybernetic
  id: SpeedLeftLeg
  name: D.A.S.H left leg
  description: A cybernetic left leg that allows its wearer to execute a bionic dash.
  components:
  - type: MovementBodyPart
    walkSpeed: 2.5 # Hardlight speed change
    sprintSpeed: 4.5 # Hardlight speed change
  - type: BodyPart
    onAdd:
    # - type: NoSlip Hardlight
    - type: ProtectedFromStepTriggers
    - type: JumpAbility
      action: Actionspeeddash
      canCollide: true
      jumpDistance: 6
      jumpSound:
        path: /Audio/Weapons/punchmiss.ogg
        params:
          pitch: 1.33
          volume: -5
          variation: 0.05
    - type: JumpCollisionKnockback
      throwForce: 50

