- type: entity
  parent: LeftArmCybernetic
  id: JawsOfLifeLeftArm
  name: J.W.L left arm
  description: A cybernetic left arm with the ability to pry doors open.
  components:
  - type: BodyPart
    onAdd:
    - type: Prying
      speedModifier: 1.5
      pryPowered: true

