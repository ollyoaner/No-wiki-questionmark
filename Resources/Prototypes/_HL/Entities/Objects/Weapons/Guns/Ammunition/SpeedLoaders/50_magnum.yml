    zeroVisible: false
  - type: Appearance

- type: entity
  id: SpeedLoader50MagnumRubber
  name: "speed loader (.50 magnum Rubber)"
  parent: BaseSpeedLoader50Magnum
  description: Designed to quickly fill an empty revolver. Holds five less-lethal rounds to knock any threat flat on their back.
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge50_magnumRubber
