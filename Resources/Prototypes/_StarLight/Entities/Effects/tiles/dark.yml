- type: entity
  id: DarkTile
  parent: BaseShadow
  name: Dark
  description: It's a strange, impenetrable darkness.
  placement:
    mode: SnapgridCenter
  components:
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          layer:
            - SlipLayer
          mask:
            - ItemMask
          density: 1000
          hard: false
    - type: FloorOccluder
    - type: Clickable
    - type: Appearance
    - type: Transform
      anchored: true
    - type: Sprite
      noRot: true
      drawdepth: FloorTiles
      sprite: _Starlight/Tiles/dark.rsi
      layers:
        - state: dark
          shader: unshaded
        - state: overlay-1
          shader: unshaded
          map: ["overlay"]
    - type: SpeedModifierContacts
      walkSpeedModifier: 0.3
      sprintSpeedModifier: 0.3
      ignoreWhitelist:
        components:
          - Shadekin
    - type: StepTrigger
      requiredTriggeredSpeed: 0
      intersectRatio: 0.1
      blacklist:
        tags:
          - Catwalk


