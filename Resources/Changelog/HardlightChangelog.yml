- author: fenndragon
  changes:
    - type: Add
      message: >-
        Added Landgrab planet-claiming/outpost systems, including PDA UI,
        save/loadable player plots, coordinate-disk engraving, plot overlays,
        persistent planet spawning, dungeon registry markers, and contract event
        support. (stated to be WIP/unfinished)
    - type: Add
      message: >-
        Added major shuttle/nav UI upgrades, including azimuth scales/rings,
        compass overlay, radar mode controls, map biome overlays, landgrab
        plot/disk markers, dungeon markers, and improved nav/radar layout
        wrapping.
    - type: Add
      message: >-
        Added Fancy Research Console UI rework with new tech tree visuals, info
        panels, rounded style boxes, connection rendering, entity-based tech
        icons, and research availability state tracking.
    - type: Add
      message: >-
        Added new SCP/visual overlay systems such as bloom, grain, retro
        monitor, and vignette effects, plus CRT shader viewport support.
    - type: Add
      message: >-
        Added new gameplay systems/components including grid claiming, grid
        raider protections, chain-radiation, scuttle device, shuttle boosting
        pilot modifiers, item miners, EMP resistance, armor piercing, drifting
        cargo prices, hitscan gatherables, contract/saving contraband support,
        and multiple persistent-planet helpers.
    - type: Add
      message: >-
        Added new regression/integration coverage with Pow3r power solver
        stability tests and vending inventory inheritance resolver tests.
    - type: Remove
      message: >-
        Removed old ChemMaster/ReagentDispenser transfer button amounts of
        25/50/100 and replaced them with a new set.
    - type: Remove
      message: >-
        Removed `RotateWithEntity` from shared shuttle/nav state flow and
        related client/server usage.
    - type: Remove
      message: >-
        Removed the standalone artifact crusher locale string in favor of shared
        activation text.
    - type: Remove
      message: Deleted stale backup/new duplicate shipyard grid save source files.
    - type: Tweak
      message: >-
        Reworked chemistry dispenser/ChemMaster amount presets to
        1/5/10/15/20/30/40/60/120.
    - type: Tweak
      message: >-
        Improved multiple UI text/display cases, including localized job loadout
        titles, shuttle orientation display, and research visuals.
    - type: Tweak
      message: >-
        Expanded vending inventory prototype support with inheritance and
        unlimited inherited stock behavior.
    - type: Tweak
      message: >-
        Adjusted shuttle movement handling to support pilot-based
        acceleration/angular multipliers.
    - type: Tweak
      message: Added board/frame size matching for machine frames and boards.
    - type: Tweak
      message: Updated README attribution tables for additional borrowed code origins.
    - type: Fix
      message: >-
        Fixed first-open shuttle map population/scan issues and several
        radar/nav coordinate, panning, anchoring, and rotation bugs.
    - type: Fix
      message: >-
        Fixed surveillance camera CRT shader hookup and scaling viewport shader
        application.
    - type: Fix
      message: >-
        Fixed watchlist async exception handling, playtime save task exception
        handling, round persistence logging, salvage mission task flow, and
        several `async void`/exception swallowing issues.
    - type: Fix
      message: >-
        Fixed flammable/fire event iteration allocation behavior, cached
        multiple hot entity queries, and reduced several repeated per-tick
        allocations/perf pitfalls across instruments, suit sensors, pathfinding,
        worldgen, NPC steering, and other systems.
    - type: Fix
      message: >-
        Fixed ship save authorization by requiring deed possession or admin
        rights before saving.
    - type: Fix
      message: >-
        Fixed ship save edge cases by backing up saves server-side, ejecting
        minded players before save deletion, removing save-contraband entities,
        sanitizing more problematic components, and deleting owning stations to
        avoid late-join black screens.
    - type: Fix
      message: >-
        Fixed docking validation to properly consider both shuttles and allow
        gas dock exceptions.
    - type: Fix
      message: >-
        Fixed FTL restrictions by preventing landings too close to
        dungeon/contract hotspots and correcting no-landing-radius checks.
    - type: Fix
      message: >-
        Fixed silicon law copying to preserve live modified laws instead of
        resetting to prototype defaults.
    - type: Fix
      message: >-
        Fixed mind/job transfer edge cases for AI/borg shunting and station pay
        scheduling across body transfers.
    - type: Fix
      message: >-
        Fixed gun/device-link firing direction, hitscan damage event
        propagation, projectile damage modifiers, and mounted gun shot origin
        behavior.
    - type: Fix
      message: >-
        Fixed NPC ranged LOS/targeting to account for destructible shoot-through
        logic and obstacle handling.
    - type: Fix
      message: >-
        Fixed cleanup/protection issues for biome planets, player-owned ships,
        claimed grids, POI infrastructure, and trash/orphan grid cleanup
        behavior.
    - type: Fix
      message: >-
        Fixed round-end auto-call override support, magboots/jetpack
        interaction, EMP scaling resistance, random teleport overload support,
        and various construction/wiring/deconstruction protection checks.
  id: 464
