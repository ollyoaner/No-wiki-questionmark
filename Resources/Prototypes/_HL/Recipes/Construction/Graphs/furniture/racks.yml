- type: constructionGraph
  id: SuitLockerBluespace
  start: start
  graph:
    - node: start
      actions:
        - !type:DeleteEntity {}
      edges:
        - to: SuitStorageBluespace
          steps:
            - material: Plasteel
              amount: 2
              doAfter: 2
            - material: MetalRod
              amount: 2
              doAfter: 2
            - material: Cable
              amount: 2
              doAfter: 2
            - material: Bluespace
              amount: 5
              doAfter: 1
    - node: SuitStorageBluespace
      entity: StructureStorageUnitBluespace
      edges:
        - to: start
          completed:
          - !type:EmptyAllContainers
          - !type:SpawnPrototype
            prototype: SheetPlasteel1
            amount: 2
          - !type:SpawnPrototype
            prototype: PartRodMetal1
            amount: 2
          - !type:SpawnPrototype
            prototype: CableApcStack1
            amount: 2
          - !type:SpawnPrototype
            prototype: MaterialBluespace1
            amount: 5
          steps:
            - tool: Screwing
              doAfter: 2
          conditions:
          - !type:StorageWelded
            welded: false
          - !type:Locked
            locked: false