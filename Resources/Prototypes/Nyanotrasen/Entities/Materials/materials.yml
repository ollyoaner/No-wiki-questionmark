- type: entity
  parent: MaterialBase
  id: MaterialBluespace
  suffix: Full
  name: bluespace crystal
  components:
  - type: Sprite
    sprite: Nyanotrasen/Objects/Materials/materials.rsi
    layers:
      - state: bluespace_3
        map: ["base"]
  - type: Appearance
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Bluespace: 100
  - type: Tag
    tags:
      - BluespaceCrystal
      - RawMaterial
  - type: TriggerOnUse
  - type: TriggerOnActivate
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/Lightning/lightningbolt.ogg
  - type: SpawnOnTrigger
    proto: EffectFlashBluespace
    mapCoords: true
  - type: BluespacePulseOnTrigger
    radius: 8
  - type: UseDelay
    delay: 5
  - type: Stack
    stackType: Bluespace
    baseLayer: base
    layerStates:
      - bluespace
      - bluespace_2
      - bluespace_3
    count: 5
  - type: Item
    size: Tiny

