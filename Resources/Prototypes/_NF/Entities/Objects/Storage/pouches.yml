# Tobacco
#region tobacco
- type: entity
  id: NFTobaccoPouch
  parent: NFPouchBase
  name: tobacco pouch
  description: A synth-leather pouch for safe storing pipe tobacco.
  components:
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,1,1
    blacklist:
      components: [ Storage ]
  - type: SpaceGarbage
  - type: Sprite
    sprite: _NF/Objects/Storage/Pouches/tobacco_pouch.rsi
    layers:
    - state: closed
      map: ["closeLayer"]
      color: "#8a4f23" # brown
    - state: open
      map: ["openLayer"]
      color: "#8a4f23"
      visible: false
    - state: fill-tobacco-1
      map: [ "pouchFill1" ]
      color: "#b07265"
      visible: false
    - state: fill-tobacco-2
      map: [ "pouchFill2" ]
      color: "#b07265"
      visible: false
    - state: fill-tobacco-3
      map: [ "pouchFill3" ]
      color: "#b07265"
      visible: false
    - state: fill-tobacco-4
      map: [ "pouchFill4" ]
      color: "#b07265"
      visible: false
    - state: label
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#8a4f23"
      right:
      - state: inhand-right
        color: "#8a4f23"
  - type: Clothing
    sprite: _NF/Objects/Storage/Pouches/tobacco_pouch.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#8a4f23"
      pocket:
      - state: equipped-BELT
        color: "#8a4f23"
  - type: Tag
    tags:
    - CigPack
    - Trash

# Punk
#region punk
- type: entity
  id: NFPouchPunk
  parent: NFPouchBase
  name: punk pouch
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["baseLayer"]
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
      visible: false
    - state: inside
      map: ["insideLayer"]
      visible: false
    - state: fill-util4-1
      map: [ "pouchFill4" ]
      visible: false
    - state: fill-util3-1
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-util2-1
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-util1-1
      map: [ "pouchFill1" ]
      visible: false
    - state: decal-line-01
      map: [ "decal1" ]
  - type: RandomSprite
    available:
      - pouchFill1:
          fill-util1-1: ""
          fill-util1-2: ""
          fill-util1-3: ""
          fill-util1-4: ""
        pouchFill2:
          fill-util2-1: ""
          fill-util2-2: ""
          fill-util2-3: ""
          fill-util2-4: ""
        pouchFill3:
          fill-util3-1: ""
          fill-util3-2: ""
          fill-util3-3: ""
          fill-util3-4: ""
        pouchFill4:
          fill-util4-1: ""
          fill-util4-2: ""
          fill-util4-3: ""
          fill-util4-4: ""
        baseLayer:
          base: Cyberpunk
        closeLayer:
          closed: Cyberpunk
        openLayer:
          open: Cyberpunk
        insideLayer:
          inside: CyberpunkNeon
        decal1:
          decal-line-01: Cyberpunk
          decal-line-02: Cyberpunk
          decal-line-03: Cyberpunk
          decal-line-04: CyberpunkNeon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#555555"
      right:
      - state: inhand-right
        color: "#555555"
  - type: Clothing
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#555555"
      pocket:
      - state: equipped-BELT
        color: "#555555"

#region trash
- type: entity
  id: NFGoblinMadeTrashPouch
  parent: [ RecyclableItemPlasticSmall, NFPouchBase ]
  name: trashuch
  components:
  - type: Sprite
    sprite: _NF/Objects/Storage/Pouches/trash_pouch.rsi
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
      visible: false
    - state: fill-trash-1
      map: [ "pouchFill1" ]
      visible: false
    - state: fill-trash-2
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-trash-3
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-trash-4
      map: [ "pouchFill4" ]
      visible: false
  - type: Item
    sprite: _NF/Objects/Storage/Pouches/trash_pouch.rsi
  - type: Clothing
    sprite: _NF/Objects/Storage/Pouches/trash_pouch.rsi
  - type: GoblinMade
  - type: Dumpable
  - type: Storage
    maxItemSize: Small
    areaInsert: true
    storageOpenSound:
      collection: trashBagRustle
    storageInsertSound:
      collection: trashBagRustle
    whitelist:
      tags:
        - Cartridge
        - Trash
      components:
        - GoblinMade
    blacklist:
      components: []
  - type: Construction
    graph: NFGoblinMadeTrashPouch
    node: NFGoblinMadeTrashPouch
