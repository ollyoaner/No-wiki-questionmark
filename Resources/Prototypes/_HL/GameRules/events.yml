    weight: 6 # Really weak compared to other critters
    duration: 10
  - type: VentHordeRule
    table: !type:GroupSelector
      rolls: !type:RangeNumberSelector
        range: 1, 100
      children:
      - id: MobAngryBeeTimed

# Dynamic Job Allocation Rule
# Adjusts Mercenary slots based on active staffed crew
# Runs at round start and every 10 minutes
- type: entity
  id: DynamicJobAllocation
  parent: BaseGameRule
  components:
  - type: GameRule # Persistent game rule
    minPlayers: 0
  - type: DynamicJobAllocationRule
    checkInterval: 600  # Check every 10 minutes (600 seconds)
    mercenaryJob: Mercenary
    mercenaryCap: 40  # Maximum slots