- type: entity # HardLight: late-round ominous lull, then a department-gated crisis (see QuietBeforeStormSystem)
  id: QuietBeforeStorm
  parent: BaseGameRule
  components:
  - type: StationEvent
    startAnnouncement: quiet-before-storm-announcement
    startAnnouncementColor: "#9a8fb0"
    startAudio:
      path: /Audio/Announcements/attention.ogg
    weight: 3
    earliestStart: 90
    minimumPlayers: 20
    maxOccurrences: 1
    duration: null # the system ends the rule once the crisis resolves
  - type: EventHeat
    cost: 50
  - type: QuietBeforeStormRule

- type: entity
