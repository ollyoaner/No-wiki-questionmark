  id: NFPouchMailCarrier
  parent: NFPouchUtility
  name: mail carrier's pouch
  components:
  - type: Sprite
    layers:
    - state: base
      color: "#b3b3b3"
    - state: closed
      map: ["closeLayer"]
      color: "#4960ed"
    - state: open
      color: "#4960ed"
      map: ["openLayer"]
      visible: false
    - state: inside
      map: ["insideLayer"]
      visible: false
    - state: fill-util4-1
      map: [ "pouchFill4" ]
      visible: false
    - state: fill-util3-1
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-util2-1
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-util1-1
      map: [ "pouchFill1" ]
      visible: false
    - state: decal-line-01
      map: [ "decal1" ]
      color: "#b33831"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#4960ed"
      right:
      - state: inhand-right
        color: "#4960ed"
  - type: Clothing
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#4960ed"
      pocket:
      - state: equipped-BELT
        color: "#4960ed"

